<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About — xcorso</title>
    <meta name="description" content="xcorso is a free, open-source orienteering course planner for Mac, Windows and iPad. Learn about features, missing features, and how to contribute." />
    <meta property="og:title" content="About — xcorso" />
    <meta property="og:description" content="Free, open-source orienteering course planner. OCAD/PDF/image maps, IOF XML export, cloud sync, touch support." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xcorso.it/about/" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; color: #374151; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: 2.5rem 1.5rem; gap: 2rem; }
      .logo { width: 4rem; height: 4rem; background: #ea580c; border-radius: 1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(234,88,12,.3); }
      .logo svg { width: 2rem; height: 2rem; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      h1 { font-size: 1.5rem; font-weight: 700; color: #111827; }
      article { max-width: 40rem; width: 100%; background: white; border: 1px solid #e5e7eb; border-radius: 1rem; padding: 1.5rem 2rem; }
      article > * + * { margin-top: 1.5rem; }
      section > * + * { margin-top: .75rem; }
      p { font-size: .9rem; line-height: 1.7; }
      h2 { font-size: 1rem; font-weight: 600; color: #111827; }
      ul { padding-left: 1.25rem; display: flex; flex-direction: column; gap: .35rem; font-size: .9rem; line-height: 1.6; }
      .muted { color: #9ca3af; }
      .divider { border-top: 1px solid #f3f4f6; padding-top: 1.5rem; }
      a { color: #ea580c; }
      a:hover { color: #c2410c; }
      .back { font-size: .85rem; color: #9ca3af; text-decoration: none; transition: color .15s; }
      .back:hover { color: #ea580c; }
    </style>
  </head>
  <body>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M3 7l6 -3 6 3 6 -3v13l-6 3-6-3-6 3z"/><path d="M9 4v13"/><path d="M15 7v13"/></svg>
    </div>
    <h1>xcorso</h1>

    <article>
      <section>
        <p>{{intro1}}</p>
        <p>{{intro2}}</p>
        <p>{{intro3}}</p>
      </section>

      <section>
        <p>{{tryDemo}}</p>
      </section>

      <section>
        <h2>{{features}}</h2>
        <ul>
{{featureList}}
        </ul>
      </section>

      <section>
        <h2>{{missing}}</h2>
        <ul class="muted">
{{missingList}}
        </ul>
      </section>

      <section>
        <p>{{feedback}}</p>
        <p>{{contact}}</p>
      </section>

      <section class="divider">
        <p>{{credits}}</p>
        <p>{{privacy}}</p>
        <p>{{source}}</p>
      </section>

      <div class="divider" style="font-size:.85rem">
        <a href="/terms.html">{{terms}}</a>
      </div>
    </article>

    <a href="/" class="back">&larr; Back to home</a>
  </body>
</html>
