name = "xcorso"
main = "worker/index.ts"
compatibility_date = "2026-05-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "xcorso-projects"

[[kv_namespaces]]
binding = "KV"
id = "a2fff06e513a4e1f9fd6e64484987825"

[vars]
RESEND_FROM = "noreply@xcorso.it"
# RESEND_API_KEY, JWT_SECRET, TURNSTILE_SECRET: set via `wrangler secret put`

# Dev preview at dev.xcorso.it
[env.dev]
name = "xcorso-dev"
routes = [{ pattern = "dev.xcorso.it", custom_domain = true }]

[env.dev.assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[env.dev.r2_buckets]]
binding = "BUCKET"
bucket_name = "xcorso-projects"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "a2fff06e513a4e1f9fd6e64484987825"

[env.dev.vars]
RESEND_FROM = "noreply@xcorso.it"
